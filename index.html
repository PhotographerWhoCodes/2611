let lang = 'zh';

const T = {
  ornament: { zh: '家庭旅行 · 2026年11月', en: 'Family Journey · November 2026' },
  title: { zh: '我们的中国行', en: 'Our China Journey' },
  sub: { zh: '古老传统 · 现代科技 · 家人同行', en: 'Ancient traditions · Modern marvels · Together' },
  meta: {
    zh: '<strong>Nov 16 – 30, 2026 · 11月16日—11月30日</strong><br>8大1小 · 西安 · 皖南 · 杭州 · 上海',
    en: "<strong>Nov 16 – 30, 2026 · November 16–30</strong><br>8 adults + 1 child · Xi'an · Anhui · Hangzhou · Shanghai"
  },
  routeLabel: { zh: '行程路线', en: 'The Route' },
  footer: { zh: '一路顺风，平安归来', en: 'Safe travels, wonderful memories' }
};

const ROUTE = [
  { dot: '✈', hl: false, name: { zh: '上海落地', en: 'Land Shanghai' }, nights: { zh: '1晚', en: '1 night' } },
  { conn: '✈' },
  { dot: '秦', hl: true, name: { zh: "Xi'an 西安", en: "Xi'an" }, nights: { zh: '3晚', en: '3 nights' } },
  { conn: '✈' },
  { dot: '徽', hl: true, name: { zh: '皖南', en: 'Anhui' }, nights: { zh: '3晚', en: '3 nights' } },
  { conn: '🚄' },
  { dot: '杭', hl: true, name: { zh: '杭州', en: 'Hangzhou' }, nights: { zh: '3晚', en: '3 nights' } },
  { conn: '🚄' },
  { dot: '沪', hl: true, name: { zh: '上海', en: 'Shanghai' }, nights: { zh: '4晚', en: '4 nights' } },
  { conn: '✈' },
  { dot: '🏠', hl: false, name: { zh: 'DC 回家', en: 'DC Home' }, nights: { zh: '', en: '' } }
];

function t(key) { return T[key][lang]; }

function render() {
  document.getElementById('cover-ornament').textContent = t('ornament');
  document.getElementById('cover-title').textContent = t('title');
  document.getElementById('cover-sub').textContent = t('sub');
  document.getElementById('cover-meta').innerHTML = t('meta');
  document.getElementById('route-label').textContent = t('routeLabel');
  document.getElementById('footer-title').textContent = t('footer');

  const rf = document.getElementById('route-flow');
  rf.innerHTML = ROUTE.map(r => {
    if (r.conn) {
      return '<div class="route-conn"><div class="route-conn-line"></div><div class="route-conn-icon">' + r.conn + '</div></div>';
    }
    return '<div class="route-stop">' +
      '<div class="route-dot' + (r.hl ? ' hl' : '') + '">' + r.dot + '</div>' +
      '<div class="route-name">' + r.name[lang] + '</div>' +
      (r.nights[lang] ? '<div class="route-nights">' + r.nights[lang] + '</div>' : '') +
      '</div>';
  }).join('');

  const isEn = lang === 'en';
  const sc = document.getElementById('stages-container');
  sc.innerHTML = STAGES.map(stage => {
    const daysHtml = stage.days.map(day => {
      const transport = (isEn ? day.transport_en : day.transport_zh) || [];
      const food = (isEn ? day.food_en : day.food_zh) || [];
      const acts = (isEn ? day.activities_en : day.activities_zh) || [];
      const tHtml = transport.map(x => '<span class="pill-t">' + x + '</span>').join('');
      const fHtml = food.map(x => '<span class="pill-f">' + x + '</span>').join('');
      const aHtml = acts.map(x => '<div class="act-row"><div class="act-dot"></div><span>' + x + '</span></div>').join('');
      return '<div class="day-entry">' +
        '<div class="day-left">' +
          '<span class="day-date-num">' + day.date + '</span>' +
          '<span class="day-dow-txt">' + (isEn ? day.dow_en : day.dow_zh) + '</span>' +
        '</div>' +
        '<div class="day-right">' +
          '<div class="day-title-txt">' + (isEn ? day.title_en : day.title_zh) + '</div>' +
          '<div class="day-hotel-txt">◇ ' + (isEn ? day.hotel_en : day.hotel_zh) + '</div>' +
          (tHtml || fHtml ? '<div class="pills">' + tHtml + fHtml + '</div>' : '') +
          '<div class="acts">' + aHtml + '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    return '<div class="stage-block">' +
      '<div class="stage-header">' +
        '<div class="stage-num">' + stage.num + '</div>' +
        '<div><div class="stage-title">' + (isEn ? stage.title_en : stage.title_zh) + '</div>' +
        '<div class="stage-dates">' + stage.dates + '</div></div>' +
      '</div>' +
      daysHtml +
    '</div>';
  }).join('');
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (l === 'zh' ? '中文' : 'English'));
  });
  render();
}

render();
</script>
